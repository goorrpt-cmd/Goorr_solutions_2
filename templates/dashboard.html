{% extends "base.html" %}

{% block content %}

<!-- Page Title -->
<h1 class="text-3xl font-bold mb-6">Dashboard</h1>

<!-- Stats Row -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">

    <!-- Card 1 -->
    <div class="bg-white shadow rounded-lg p-5 border">
        <p class="text-sm text-gray-500">Total Candidates</p>
        <p class="text-3xl font-semibold text-blue-600 mt-2">248</p>
    </div>

    <!-- Card 2 -->
    <div class="bg-white shadow rounded-lg p-5 border">
        <p class="text-sm text-gray-500">Active Recruiters</p>
        <p class="text-3xl font-semibold text-green-600 mt-2">12</p>
    </div>

    <!-- Card 3 -->
    <div class="bg-white shadow rounded-lg p-5 border">
        <p class="text-sm text-gray-500">Pending Interviews</p>
        <p class="text-3xl font-semibold text-yellow-600 mt-2">31</p>
    </div>

    <!-- Card 4 -->
    <div class="bg-white shadow rounded-lg p-5 border">
        <p class="text-sm text-gray-500">New This Week</p>
        <p class="text-3xl font-semibold text-purple-600 mt-2">19</p>
    </div>

</div>

<!-- Main Grid -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

    <!-- Left Column -->
    <div class="lg:col-span-2 space-y-8">

        <!-- Recent Candidates -->
        <div class="bg-white shadow rounded-lg p-6 border">
            <h2 class="text-xl font-semibold mb-4">Recent Candidates</h2>

            <div hx-get="/dashboard/recent-candidates/"
                 hx-trigger="load"
                 hx-target="#recent-candidates"
                 hx-swap="innerHTML">
            </div>

            <div id="recent-candidates" class="text-gray-500 text-sm">
                Loading…
            </div>
        </div>

        <!-- Upcoming Interviews -->
        <div class="bg-white shadow rounded-lg p-6 border">
            <h2 class="text-xl font-semibold mb-4">Upcoming Interviews</h2>

            <div hx-get="/dashboard/upcoming-interviews/"
                 hx-trigger="load"
                 hx-target="#upcoming-interviews"
                 hx-swap="innerHTML">
            </div>

            <div id="upcoming-interviews" class="text-gray-500 text-sm">
                Loading…
            </div>
        </div>

    </div>

    <!-- Right Column -->
    <div class="space-y-8">

        <!-- Activity Feed -->
        <div class="bg-white shadow rounded-lg p-6 border">
            <h2 class="text-xl font-semibold mb-4">Activity Feed</h2>

            <div hx-get="/dashboard/activity/"
                 hx-trigger="load"
                 hx-target="#activity-feed"
                 hx-swap="innerHTML">
            </div>

            <div id="activity-feed" class="text-gray-500 text-sm">
                Loading…
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="bg-white shadow rounded-lg p-6 border">
            <h2 class="text-xl font-semibold mb-4">Quick Actions</h2>

            <div class="flex flex-col gap-3">

                <a href="/admin/app/candidate/add/"
                   class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-center">
                    Add Candidate
                </a>

                <a href="/admin/"
                   class="px-4 py-2 bg-gray-700 text-white rounded hover:bg-gray-800 text-center">
                    Open Admin
                </a>

                <button hx-get="/hello/"
                        hx-target="#content"
                        hx-swap="innerHTML"
                        class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
                    Test HTMX
                </button>

            </div>
        </div>

    </div>

</div>

{% endblock %}
