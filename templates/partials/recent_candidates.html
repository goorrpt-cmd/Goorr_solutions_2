<table class="w-full text-sm">
    <thead>
        <tr class="text-left border-b">
            <th class="py-2">ID</th>
            <th>Name</th>
            <th>Status</th>
            <th>Created</th>
        </tr>
    </thead>
    <tbody>
        {% for c in candidates %}
        <tr class="border-b hover:bg-gray-50">
            <td class="py-2">{{ c.candidate_id }}</td>
            <td>{{ c.first_name }} {{ c.last_name }}</td>
            <td>{{ c.status }}</td>
            <td>{{ c.created_at|date:"Y-m-d" }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="4" class="py-4 text-gray-500">No candidates found.</td></tr>
        {% endfor %}
    </tbody>
</table>
