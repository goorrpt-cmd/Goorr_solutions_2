{% extends "base.html" %}
{% block content %}
<h1 class="text-3xl font-bold mb-6">Admin Dashboard</h1>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

    <div class="bg-white shadow p-5 rounded border">
        <p class="text-sm text-gray-500">Total Candidates</p>
        <p class="text-3xl font-semibold text-blue-600">{{ total_candidates }}</p>
    </div>

    <div class="bg-white shadow p-5 rounded border">
        <p class="text-sm text-gray-500">Interviews</p>
        <p class="text-3xl font-semibold text-green-600">{{ total_interviews }}</p>
    </div>

    <div class="bg-white shadow p-5 rounded border">
        <p class="text-sm text-gray-500">Training Batches</p>
        <p class="text-3xl font-semibold text-purple-600">{{ total_batches }}</p>
    </div>

    <div class="bg-white shadow p-5 rounded border">
        <p class="text-sm text-gray-500">Employers</p>
        <p class="text-3xl font-semibold text-yellow-600">{{ total_employers }}</p>
    </div>

</div>
{% endblock %}
